<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelato Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--surface:#fff;--s2:#f5f5f7;--s3:#e8e8ed;
  --b:rgba(0,0,0,.08);--b2:rgba(0,0,0,.12);
  --t1:#1d1d1f;--t2:#424245;--t3:#6e6e73;--t4:#aeaeb2;
  --accent:#0071e3;--green:#34c759;--gbg:rgba(52,199,89,.1);
  --orange:#ff9500;--obg:rgba(255,149,0,.1);
  --red:#ff3b30;--rbg:rgba(255,59,48,.1);
  --blue-bg:rgba(0,113,227,.08);--rl:14px;
  --shs:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans TC',system-ui,sans-serif;font-size:13px}

/* HEADER */
header{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);padding:0 18px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%}
.hbtns{display:flex;gap:5px;align-items:center}
.sep{width:1px;height:18px;background:var(--b2);margin:0 2px}
.btn{height:28px;padding:0 12px;border-radius:7px;font-size:11.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-ghost{background:var(--s3);color:var(--t2)}.btn-ghost:hover{background:#d1d1d6}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:#0077ed}
.btn-icon{width:28px;padding:0;display:flex;align-items:center;justify-content:center}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* LAYOUT */
.app{display:grid;grid-template-columns:1fr 310px;height:calc(100vh - 48px);overflow:hidden}
.main-col{overflow-y:auto;padding:12px 10px 12px 14px;display:flex;flex-direction:column;gap:9px}
.side-col{overflow-y:auto;padding:12px 14px 12px 10px;display:flex;flex-direction:column;gap:9px;border-left:1px solid var(--b)}

/* CARDS — all white */
.card{background:#fff;border-radius:var(--rl);border:1px solid var(--b);box-shadow:var(--shs)}
.card-hd{padding:10px 14px 0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11.5px;font-weight:600;letter-spacing:-.1px;color:var(--t1)}
.card-body{padding:8px 14px 12px}

/* TARGET BAR */
.tbar{background:#fff;border-radius:var(--rl);border:1px solid var(--b);box-shadow:var(--shs);padding:12px 16px}
.tbar-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tbar label{font-size:9.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:3px}
.tbar-inp{display:flex;align-items:baseline;gap:4px}
#targetWeight{background:transparent;border:none;font-size:20px;font-weight:500;color:var(--t1);width:72px;text-align:right;outline:none;-moz-appearance:textfield}
#targetWeight::-webkit-inner-spin-button,#targetWeight::-webkit-outer-spin-button{-webkit-appearance:none}
.t-unit{font-size:12px;color:var(--t3)}
.scale-badge{background:var(--blue-bg);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.auto-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11.5px;color:var(--t2)}
.auto-lbl input{accent-color:var(--accent);width:13px;height:13px}
.type-toggle{display:flex;background:var(--s3);border-radius:7px;padding:2px;gap:2px}
.type-btn{background:transparent;border:none;padding:4px 11px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;color:var(--t3);transition:all .15s}
.type-btn.active{background:#fff;color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* DASHBOARD — 4 big stats (white) */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.dkpi{background:#fff;border-radius:10px;border:1px solid var(--b);padding:11px 13px;position:relative;overflow:hidden}
.dkpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dkpi.ok::after{background:var(--green)}.dkpi.warn::after{background:var(--orange)}.dkpi.bad::after{background:var(--red)}
.dkpi-lbl{font-size:9.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.2px;margin-bottom:3px}
.dkpi-val{font-size:22px;font-weight:600;letter-spacing:-.8px;color:var(--t1);line-height:1}
.dkpi-val.ok{color:#248a3d}.dkpi-val.warn{color:#c05c00}.dkpi-val.bad{color:#c0392b}
.dkpi-tgt{font-size:9px;color:var(--t4);margin-top:3px}
/* stats row */
.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.dstat{background:#fff;border-radius:9px;border:1px solid var(--b);padding:9px 11px}
.dstat-lbl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.2px;margin-bottom:2px}
.dstat-val{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-.3px}
.dstat-val.hi{color:#c0392b}.dstat-val.ok{color:#248a3d}.dstat-val.warn{color:#c05c00}
.dstat-sub{font-size:9px;color:var(--t4);margin-top:1px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:9.5px;font-weight:500;color:var(--t3);letter-spacing:.2px;text-transform:uppercase;padding:5px 6px;text-align:right;border-bottom:1px solid var(--b);white-space:nowrap}
thead th:first-child{text-align:left;padding-left:12px}
thead th:last-child{width:46px}
tbody tr{border-bottom:1px solid var(--b);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
td{padding:4px 6px;text-align:right;color:var(--t2);font-size:11px;font-variant-numeric:tabular-nums}
td:first-child{text-align:left;padding-left:12px;color:var(--t1);font-weight:500;font-size:12px}
tfoot tr{border-top:1px solid var(--b2);background:#fafafa}
tfoot td{padding:6px 6px;font-weight:600;font-size:11px}
tfoot td:first-child{padding-left:12px}
/* weight input — no spinners */
input.ci{background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:3px 5px;font-size:11px;color:var(--accent);text-align:right;outline:none;transition:border-color .15s;font-variant-numeric:tabular-nums;-moz-appearance:textfield;width:62px}
input.ci::-webkit-inner-spin-button,input.ci::-webkit-outer-spin-button{-webkit-appearance:none}
input.ci:focus{border-color:var(--accent);background:#fff}
input.ci.cost{color:var(--green)}
.del-btn,.edit-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 4px;border-radius:4px;line-height:1;transition:all .12s}
.del-btn{color:var(--t4)}.del-btn:hover{color:var(--red);background:var(--rbg)}
.edit-btn{color:var(--t4)}.edit-btn:hover{color:var(--accent);background:var(--blue-bg)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.kpi{border-radius:7px;border:1px solid var(--b);padding:7px 9px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.kpi.ok{background:var(--gbg)}.kpi.ok::after{background:var(--green)}
.kpi.warn{background:var(--obg)}.kpi.warn::after{background:var(--orange)}
.kpi.bad{background:var(--rbg)}.kpi.bad::after{background:var(--red)}
.kpi-lbl{font-size:9px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.2px;margin-bottom:2px}
.kpi-val{font-size:13px;font-weight:600;line-height:1;letter-spacing:-.3px}
.kpi-val.ok{color:#248a3d}.kpi-val.warn{color:#c05c00}.kpi-val.bad{color:#c0392b}
.kpi-tgt{font-size:9px;color:var(--t4);margin-top:2px}
.kpi-ico{position:absolute;top:6px;right:7px;font-size:9.5px}
.sugar-warn{background:#fff3cd;border:1px solid #ffc107;border-radius:7px;padding:6px 10px;font-size:11px;color:#856404;margin-top:6px;display:none}
.sugar-warn.show{display:block}

/* SUGAR PANEL */
.sugar-panel .sp-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b)}
.sugar-panel .sp-row:last-child{border:none}
.sp-lbl{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px}
.sp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sp-val{font-size:12px;font-weight:600;color:var(--t1);font-variant-numeric:tabular-nums}
.sp-pct{font-size:10.5px;color:var(--t3);margin-left:4px}
.sp-bar-wrap{height:3px;background:var(--s3);border-radius:2px;margin-top:2px}
.sp-bar{height:100%;border-radius:2px;transition:width .35s}

/* BARS */
.bar-row{margin-bottom:7px}.bar-row:last-child{margin-bottom:0}
.bar-lbl-row{display:flex;justify-content:space-between;margin-bottom:2px}
.bar-name{font-size:9.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.2px}
.bar-val{font-size:10.5px;font-weight:600;font-variant-numeric:tabular-nums}
.bar-track{height:4px;background:var(--s3);border-radius:3px;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .35s}
.bar-range{position:absolute;top:-2px;height:8px;background:rgba(52,199,89,.18);border-left:1.5px solid var(--green);border-right:1.5px solid var(--green);border-radius:2px}

/* PIE / DONUT */
.pie-wrap{display:flex;gap:12px;align-items:center}
.legend{flex:1;display:flex;flex-direction:column;gap:3px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-pct{font-weight:600;color:var(--t1);flex-shrink:0;font-variant-numeric:tabular-nums}

/* COST */
.cost-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b);font-size:11.5px}
.cost-row:last-child{border:none}
.cost-lbl{color:var(--t2)}.cost-amt{font-weight:500;font-variant-numeric:tabular-nums}
.cost-total{font-size:17px;font-weight:600;color:var(--green);letter-spacing:-.5px}

/* PACKAGING */
.pkg-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--b)}
.pkg-row:last-child{border:none}
.pkg-name{flex:1;font-size:11.5px;color:var(--t2)}
input.pkg-ci{width:72px;background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:3px 5px;font-size:11px;color:var(--green);text-align:right;outline:none;-moz-appearance:textfield}
input.pkg-ci::-webkit-inner-spin-button,input.pkg-ci::-webkit-outer-spin-button{-webkit-appearance:none}
input.pkg-ci:focus{border-color:var(--accent);background:#fff}
.pkg-del{background:none;border:none;cursor:pointer;color:var(--t4);font-size:11px;padding:2px 4px;border-radius:3px}
.pkg-del:hover{color:var(--red);background:var(--rbg)}

/* SAVE */
.save-form{display:flex;gap:6px}
#recipeName{flex:1;min-width:0;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--t1);outline:none}
#recipeName:focus{border-color:var(--accent);background:#fff}
.saved-list{margin-top:6px;display:flex;flex-direction:column;gap:2px;max-height:110px;overflow-y:auto}
.saved-item{display:flex;align-items:center;padding:5px 7px;border-radius:7px;transition:background .1s}
.saved-item:hover{background:var(--s2)}
.saved-nm{font-size:11.5px;font-weight:500;color:var(--t1);cursor:pointer;flex:1}
.saved-dt{font-size:10px;color:var(--t4)}
.saved-del{background:none;border:none;cursor:pointer;color:var(--t4);font-size:11px;padding:2px 4px;border-radius:3px;margin-left:3px}
.saved-del:hover{color:var(--red);background:var(--rbg)}
.empty-state{font-size:11px;color:var(--t4);text-align:center;padding:12px 0;font-style:italic}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:460px;max-width:96vw;max-height:88vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column}
.modal-hd{padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.modal-x{background:var(--s3);border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;color:var(--t3);display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:#d1d1d6}
.modal-body{padding:12px 18px;overflow-y:auto;flex:1}
.modal-footer{padding:9px 18px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--b)}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:9.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.mf input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--t1);outline:none;-moz-appearance:textfield}
.mf input::-webkit-inner-spin-button,.mf input::-webkit-outer-spin-button{-webkit-appearance:none}
.mf input:focus{border-color:var(--accent);background:#fff}
.mf .hint{font-size:9.5px;color:var(--t4);margin-top:2px}
.fac-box{background:var(--s2);border-radius:8px;padding:10px}
.fac-title{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.fac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.db-section-title{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--b)}
.db-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:7px;border:1px solid transparent;transition:all .1s}
.db-item:hover{background:var(--blue-bg);border-color:rgba(0,113,227,.12)}
.db-item-name{font-size:12px;font-weight:500}
.db-item-meta{font-size:10px;color:var(--t3)}
.db-item-acts{display:flex;gap:4px;align-items:center}
.db-edit-btn{background:none;border:none;cursor:pointer;color:var(--t4);font-size:10px;padding:2px 5px;border-radius:3px}
.db-edit-btn:hover{color:var(--accent);background:var(--blue-bg)}
.demo-card{border:1px solid var(--b);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.demo-card:hover{background:var(--blue-bg);border-color:rgba(0,113,227,.18)}
.demo-title{font-size:12.5px;font-weight:600;margin-bottom:1px}
.demo-desc{font-size:10.5px;color:var(--t3);margin-bottom:7px}
.demo-tags{display:flex;flex-wrap:wrap;gap:3px}
.demo-tag{background:var(--s2);border-radius:3px;padding:2px 6px;font-size:10px;color:var(--t2)}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(29,29,31,.9);backdrop-filter:blur(20px);color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all .22s;pointer-events:none;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{
  header .hbtns,.del-btn,.edit-btn,.save-form,.saved-list,.overlay{display:none!important}
  .app{display:block;height:auto}.main-col,.side-col{overflow:visible;padding:6px}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>Gelato Lab</div>
  <div class="hbtns">
    <button class="btn btn-icon btn-ghost" id="undoBtn" onclick="undo()" title="還原 ⌘Z" disabled>↩</button>
    <button class="btn btn-icon btn-ghost" id="redoBtn" onclick="redo()" title="重做 ⌘Y" disabled>↪</button>
    <div class="sep"></div>
    <button class="btn btn-ghost" onclick="openDemoPanel()">🍦 Demo</button>
    <button class="btn btn-ghost" onclick="exportCSV()">匯出 CSV</button>
    <button class="btn btn-ghost" onclick="window.print()">列印</button>
    <button class="btn btn-accent" onclick="openAddModal(false)">＋ 新增材料</button>
  </div>
</header>

<div class="app">
<div class="main-col">

  <!-- TARGET BAR -->
  <div class="tbar">
    <div class="tbar-inner">
      <div>
        <label>批次重量</label>
        <div class="tbar-inp">
          <input type="number" id="targetWeight" value="1000" min="10" max="99999" step="10" oninput="onTargetInput()">
          <span class="t-unit">g</span>
        </div>
      </div>
      <div class="scale-badge">縮放 <span id="scaleRatio">1.00×</span></div>
      <label class="auto-lbl"><input type="checkbox" id="autoScale" checked onchange="onTargetInput()">自動縮放</label>
      <div>
        <label>配方類型</label>
        <div class="type-toggle">
          <button class="type-btn active" id="btnGelato" onclick="setType('gelato')">🥛 Gelato</button>
          <button class="type-btn" id="btnSorbet" onclick="setType('sorbet')">🍋 Sorbet</button>
        </div>
      </div>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:flex-end">
        <div>
          <label>Overrun %</label>
          <input type="number" id="overrunInput" value="30" min="0" max="100" step="5"
            style="width:52px;background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:3px 6px;font-size:12px;color:var(--t1);outline:none;-moz-appearance:textfield;text-align:right"
            oninput="renderAll()">
        </div>
        <div>
          <label>ALC %</label>
          <input type="number" id="alcInput" value="0" min="0" max="40" step="0.5"
            style="width:52px;background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:3px 6px;font-size:12px;color:var(--t1);outline:none;-moz-appearance:textfield;text-align:right"
            oninput="renderAll()">
        </div>
        <button class="btn btn-ghost" style="height:26px;font-size:11px" onclick="resetToBase()">↩ 基準</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD 4 BIG KPIS -->
  <div>
    <div class="dash-grid" id="dashKpis"></div>
    <div class="stat-row" id="dashStats"></div>
  </div>

  <!-- FORMULA TABLE -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">配方材料</span>
      <div style="display:flex;gap:5px;align-items:center">
        <span style="font-size:10px;color:var(--t3)" id="totalWeightBadge"></span>
        <button class="btn btn-ghost" style="height:23px;padding:0 8px;font-size:10.5px" onclick="openAddModal(false)">＋ 新增</button>
      </div>
    </div>
    <div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left">材料名稱</th>
            <th>重量(g)</th><th>佔比%</th><th>TS固形</th>
            <th title="= 重量 × PAC係數">PAC貢獻</th>
            <th title="= 重量 × POD係數">POD貢獻</th>
            <th>脂肪</th><th>葡萄糖</th><th>MSNF</th>
            <th>蛋白質</th><th>纖維</th><th>乳糖</th>
            <th>成本/g</th><th>小計</th><th></th>
          </tr></thead>
          <tbody id="ingredientRows"></tbody>
          <tfoot><tr>
            <td>總計</td>
            <td id="tW">—</td><td id="tPct" style="color:var(--green)">—</td>
            <td id="tTS">—</td><td id="tPAC">—</td><td id="tPOD">—</td>
            <td id="tFat">—</td><td id="tGluc">—</td><td id="tMSNF">—</td>
            <td id="tPro">—</td><td id="tFib">—</td><td id="tLac">—</td>
            <td>—</td><td id="tCost" style="color:var(--green)">—</td><td></td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- BOTTOM ROW -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">
    <!-- COST -->
    <div class="card">
      <div class="card-hd"><span class="card-title">成本分析</span></div>
      <div class="card-body" id="costSummary"></div>

<script>
// ── PALETTE ───────────────────────────────────────────────────────────────────
const PAL=['#0071e3','#34c759','#ff9500','#ff3b30','#5856d6','#32ade6','#ff2d55','#af52de','#ff6b35','#30b0c7','#a2845e','#6d6d72'];
const SUGAR_COLORS={sucrose:'#ff9500',dextrose:'#ff3b30',de21:'#5856d6',invert:'#af52de',fructose:'#ff2d55',other:'#aeaeb2'};

// ── MATERIAL DB ───────────────────────────────────────────────────────────────
const BUILTIN={
  "全脂牛奶":         {ts:.118,pac:0,   pod:0,   fat:.036,gluc:0,   msnf:.090,pro:.032,fib:0,   lac:.047,alc:0,  cost:.09 },
  "自製乳清(Whey)":   {ts:.065,pac:0,   pod:0,   fat:.001,gluc:0,   msnf:.065,pro:.008,fib:0,   lac:.050,alc:0,  cost:0   },
  "鮮奶油(35%)":      {ts:.405,pac:0,   pod:0,   fat:.35, gluc:0,   msnf:.055,pro:.022,fib:0,   lac:.030,alc:0,  cost:.25 },
  "自製Mascarpone":   {ts:.55, pac:0,   pod:0,   fat:.45, gluc:0,   msnf:.05, pro:.060,fib:0,   lac:.030,alc:0,  cost:.3  },
  "脫脂奶粉(SMP)":    {ts:.97, pac:0,   pod:0,   fat:.01, gluc:0,   msnf:.97, pro:.360,fib:0,   lac:.520,alc:0,  cost:.3  },
  "上白糖":           {ts:1.0, pac:1.0, pod:1.0, fat:0,   gluc:0,   msnf:0,   pro:0,   fib:0,   lac:0,   alc:0,  cost:.04 },
  "右旋糖(Dextrose)": {ts:.95, pac:1.9, pod:.75, fat:0,   gluc:.95, msnf:0,   pro:0,   fib:0,   lac:0,   alc:0,  cost:.12 },
  "DE21葡萄糖粉":     {ts:.95, pac:.6,  pod:.45, fat:0,   gluc:.45, msnf:0,   pro:0,   fib:0,   lac:0,   alc:0,  cost:.155},
  "CF 膠體":          {ts:.99, pac:0,   pod:0,   fat:0,   gluc:0,   msnf:0,   pro:0,   fib:0,   lac:0,   alc:0,  cost:1.8 },
  "草莓果泥":         {ts:.10, pac:.5,  pod:.10, fat:0,   gluc:.05, msnf:0,   pro:.007,fib:.02, lac:0,   alc:0,  cost:.08 },
  "檸檬汁":           {ts:.07, pac:.3,  pod:0,   fat:0,   gluc:.03, msnf:0,   pro:.005,fib:.02, lac:0,   alc:0,  cost:.05 },
  "開心果醬":         {ts:.97, pac:0,   pod:.05, fat:.55, gluc:0,   msnf:0,   pro:.200,fib:.06, lac:0,   alc:0,  cost:1.2 },
  "轉化糖":           {ts:1.0, pac:1.9, pod:1.3, fat:0,   gluc:.5,  msnf:0,   pro:0,   fib:0,   lac:0,   alc:0,  cost:.12 },
  "Dark Rum 40%":     {ts:.02, pac:7.4, pod:0,   fat:0,   gluc:0,   msnf:0,   pro:0,   fib:0,   lac:0,   alc:.40, cost:.20},
  "菊苣纖維(Inulin)": {ts:.95, pac:.1,  pod:.1,  fat:0,   gluc:0,   msnf:0,   pro:0,   fib:.90, lac:0,   alc:0,  cost:.25 },
};
let materialDB=JSON.parse(localStorage.getItem('gelatolab_db')||'null')||JSON.parse(JSON.stringify(BUILTIN));
Object.entries(BUILTIN).forEach(([k,v])=>{ if(!materialDB[k]) materialDB[k]={...v}; });
saveDB();

// ── STATE ──────────────────────────────────────────────────────────────────────
let recipeType='gelato';
let formula=[
  {name:"全脂牛奶",         weight:467},
  {name:"自製乳清(Whey)",   weight:50 },
  {name:"鮮奶油(35%)",      weight:75 },
  {name:"自製Mascarpone",   weight:170},
  {name:"脫脂奶粉(SMP)",    weight:40 },
  {name:"上白糖",           weight:100},
  {name:"右旋糖(Dextrose)", weight:68 },
  {name:"DE21葡萄糖粉",     weight:25 },
  {name:"CF 膠體",          weight:5  },
];
let baseTarget=1000;
let basePcts=mkPcts();
let pkgItems=[
  {name:'杯子',cost:0},{name:'蓋子',cost:0},{name:'貼紙',cost:0},
  {name:'湯匙',cost:0},{name:'包裝袋',cost:0},
];

function mkPcts(){ const W=formula.reduce((s,f)=>s+f.weight,0); return formula.map(f=>W>0?f.weight/W:0); }

// ── UNDO/REDO ──────────────────────────────────────────────────────────────────
let hist=[],histIdx=-1;
function snapshot(){
  const s=JSON.stringify({formula,basePcts,baseTarget,target:getT(),recipeType,pkgItems});
  if(histIdx<hist.length-1) hist=hist.slice(0,histIdx+1);
  hist.push(s); if(hist.length>60)hist.shift();
  histIdx=hist.length-1; updUR();
}
function undo(){ if(histIdx<=0)return; histIdx--; applyState(JSON.parse(hist[histIdx])); showToast('還原 ↩'); }
function redo(){ if(histIdx>=hist.length-1)return; histIdx++; applyState(JSON.parse(hist[histIdx])); showToast('重做 ↪'); }
function applyState(s){
  formula=s.formula; basePcts=s.basePcts; baseTarget=s.baseTarget;
  pkgItems=s.pkgItems||pkgItems;
  document.getElementById('targetWeight').value=s.target;
  if(s.recipeType)_setType(s.recipeType);
  updateScaleRatio(); renderAll(); updUR();
}
function updUR(){ document.getElementById('undoBtn').disabled=histIdx<=0; document.getElementById('redoBtn').disabled=histIdx>=hist.length-1; }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getT(){ return parseFloat(document.getElementById('targetWeight').value)||1000 }
function getF(n){ return materialDB[n]||{ts:0,pac:0,pod:0,fat:0,gluc:0,msnf:0,pro:0,fib:0,lac:0,alc:0,cost:0} }
function totalW(){ return formula.reduce((s,f)=>s+f.weight,0) }
function saveDB(){ localStorage.setItem('gelatolab_db',JSON.stringify(materialDB)) }
function getOverrun(){ return parseFloat(document.getElementById('overrunInput').value)||0 }

function calcTotals(){
  let W=0,TS=0,PAC=0,POD=0,Fat=0,Gluc=0,MSNF=0,Cost=0,TPOD=0;
  let Pro=0,Fib=0,Lac=0,Alc=0;
  let SucW=0,DexW=0,De21W=0,InvW=0,OtherSugW=0,TotalSugW=0;
  formula.forEach(({name,weight:w})=>{
    const f=getF(name);
    W+=w; TS+=w*f.ts; PAC+=w*f.pac; POD+=w*f.pod;
    Fat+=w*f.fat; Gluc+=w*f.gluc; MSNF+=w*f.msnf; Cost+=w*f.cost;
    TPOD+=w*f.pod; Pro+=w*(f.pro||0); Fib+=w*(f.fib||0); Lac+=w*(f.lac||0); Alc+=w*(f.alc||0);
    if(f.pod>0) TotalSugW+=w;
    const n=name.toLowerCase();
    if(n.includes('蔗糖')||n.includes('上白糖')||n.includes('砂糖')||n.includes('sucrose')) SucW+=w;
    else if(n.includes('右旋糖')||n.includes('dextrose')) DexW+=w;
    else if(n.includes('de21')||n.includes('葡萄糖粉')||n.includes('葡萄糖漿')) De21W+=w;
    else if(n.includes('轉化糖')||n.includes('invert')) InvW+=w;
    else if(f.pod>0) OtherSugW+=w;
  });
  const alcExtra=(parseFloat(document.getElementById('alcInput').value)||0)/100*W;
  Alc=Math.max(Alc,alcExtra);
  const alcPAC=Alc*7.4;
  const totalPAC=PAC+alcPAC;
  // Storage temp estimate (°C): empirical rule, PAC absolute → ΔT
  // Industry: for each PAC unit (relative to 1000g), ΔT ≈ 0.054°C per %
  // But PAC is absolute here, so storageTempC = -(totalPAC/W*100)*0.054
  const pacPct=W>0?totalPAC/W*100:0;
  const storageTempC=-(pacPct*0.054);
  return{
    W,TS,PAC:totalPAC,POD,Fat,Gluc,MSNF,Cost,Pro,Fib,Lac,Alc,
    pac_abs:totalPAC,
    pac_pct:pacPct,
    ts_pct:W?TS/W*100:0, pod_pct:W?POD/W*100:0, fat_pct:W?Fat/W*100:0,
    gluc_pct:W?Gluc/W*100:0, msnf_pct:W?MSNF/W*100:0, fw_pct:W?100-TS/W*100:100,
    pro_pct:W?Pro/W*100:0, fib_pct:W?Fib/W*100:0, lac_pct:W?Lac/W*100:0, alc_pct:W?Alc/W*100:0,
    glucSugar:TPOD>0?Gluc/TPOD*100:0,
    cpg:W?Cost/W:0,
    totalSugar_pct:W?TotalSugW/W*100:0,
    sucrose_pct:TotalSugW?SucW/TotalSugW*100:0,
    dextrose_pct:TotalSugW?DexW/TotalSugW*100:0,
    de21_pct:TotalSugW?De21W/TotalSugW*100:0,
    invert_pct:TotalSugW?InvW/TotalSugW*100:0,
    otherSug_pct:TotalSugW?OtherSugW/TotalSugW*100:0,
    SucW,DexW,De21W,InvW,OtherSugW,TotalSugW,
    storageTempC,
  };
}

// ── RECIPE TYPE / TARGETS ─────────────────────────────────────────────────────
const TARGETS={
  gelato:{
    pac_abs:{lo:220,hi:280},
    pod:{lo:15,hi:18},
    ts:{lo:30,hi:45},
    fat:{lo:6,hi:10},
    msnf:{lo:8,hi:11},
    fw:{lo:55,hi:70},
    totalSugar:{lo:16,hi:22},
    sucrose:{lo:60,hi:100},
    dextrose:{lo:0,hi:25},
    lac:{lo:null,hi:6},
    gluc:{lo:4,hi:8},
    glucSugar:{lo:20,hi:45},
  },
  sorbet:{
    pac_abs:{lo:300,hi:380},
    pod:{lo:20,hi:26},
    ts:{lo:28,hi:34},
    fat:{lo:null,hi:1},
    msnf:{lo:null,hi:2},
    fw:{lo:null,hi:55},
    totalSugar:{lo:28,hi:32},
    sucrose:{lo:60,hi:100},
    dextrose:{lo:0,hi:25},
    lac:{lo:null,hi:1},
    gluc:{lo:4,hi:10},
    glucSugar:{lo:20,hi:50},
  },
};
function getTgt(k){ return TARGETS[recipeType][k]||{lo:null,hi:null} }
function _setType(t){
  recipeType=t;
  document.getElementById('btnGelato').classList.toggle('active',t==='gelato');
  document.getElementById('btnSorbet').classList.toggle('active',t==='sorbet');
}
function setType(t){ _setType(t); renderKPI(); renderBars(); renderDashboard(); showToast(t==='gelato'?'Gelato 目標':'Sorbet 目標'); }
function kStat(v,tgt){
  if(!tgt||tgt.hi===null&&tgt.lo===null)return'ok';
  if(tgt.lo!==null)return(v>=tgt.lo&&v<=tgt.hi)?'ok':v<tgt.lo?'bad':'warn';
  return v<=tgt.hi?'ok':'bad';
}
function kLbl(tgt,unit){
  if(!tgt||tgt.hi===null&&tgt.lo===null)return'—';
  return tgt.lo!==null?`${tgt.lo}–${tgt.hi}${unit}`:`<${tgt.hi}${unit}`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const t=calcTotals();
  const big=[
    {lbl:'固形物 TS',val:t.ts_pct,key:'ts',unit:'%',fmt:v=>v.toFixed(1)},
    {lbl:'水分 FW',  val:t.fw_pct,key:'fw',unit:'%',fmt:v=>v.toFixed(1)},
    {lbl:'總糖',     val:t.totalSugar_pct,key:'totalSugar',unit:'%',fmt:v=>v.toFixed(1)},
    {lbl:'脂肪 Fat', val:t.fat_pct,key:'fat',unit:'%',fmt:v=>v.toFixed(1)},
  ];
  const g=document.getElementById('dashKpis'); g.innerHTML='';
  big.forEach(b=>{
    const tgt=getTgt(b.key),s=kStat(b.val,tgt);
    const d=document.createElement('div'); d.className=`dkpi ${s}`;
    d.innerHTML=`<div class="dkpi-lbl">${b.lbl}</div>
      <div class="dkpi-val ${s}">${b.fmt(b.val)}${b.unit}</div>
      <div class="dkpi-tgt">${kLbl(tgt,b.unit)}</div>`;
    g.appendChild(d);
  });
  const overrun=getOverrun();
  const volCost=t.W>0?(t.Cost/t.W/(1+overrun/100)*100).toFixed(2):0;
  const stats=[
    {lbl:'保存溫度',val:`${t.storageTempC.toFixed(1)}°C`,sub:'由PAC推算',cls:t.storageTempC<-20?'warn':'ok'},
    {lbl:'PAC',     val:t.pac_abs.toFixed(1),sub:`目標 ${kLbl(getTgt('pac_abs'),'')}`  ,cls:kStat(t.pac_abs,getTgt('pac_abs'))},
    {lbl:'POD %',   val:`${t.pod_pct.toFixed(1)}%`,sub:`目標 ${kLbl(getTgt('pod'),'%')}`,cls:kStat(t.pod_pct,getTgt('pod'))},
    {lbl:'MSNF %',  val:`${t.msnf_pct.toFixed(1)}%`,sub:`目標 ${kLbl(getTgt('msnf'),'%')}`,cls:kStat(t.msnf_pct,getTgt('msnf'))},
    {lbl:'Overrun', val:`${overrun}%`,sub:`每100ml ≈ ${volCost}元`,cls:''},
    {lbl:'酒精 ALC',val:`${t.alc_pct.toFixed(1)}%`,sub:t.alc_pct>5?'⚠ 注意PAC影響':'乙醇',cls:t.alc_pct>5?'warn':''},
  ];
  const r=document.getElementById('dashStats'); r.innerHTML='';
  stats.forEach(s=>{
    const d=document.createElement('div'); d.className='dstat';
    d.innerHTML=`<div class="dstat-lbl">${s.lbl}</div>
      <div class="dstat-val ${s.cls}">${s.val}</div>
      <div class="dstat-sub">${s.sub}</div>`;
    r.appendChild(d);
  });
}

// ── TABLE ──────────────────────────────────────────────────────────────────────
function renderTable(){
  const W=totalW(), tbody=document.getElementById('ingredientRows');
  tbody.innerHTML='';
  formula.forEach((item,i)=>{
    const f=getF(item.name),w=item.weight;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${item.name}</td>
      <td><input class="ci" type="number" value="${w}" min="0" step="1"
        onchange="onWtChange(${i},this.value)" onblur="snapshot()"></td>
      <td style="color:var(--t3)">${W>0?(w/W*100).toFixed(1)+'%':'—'}</td>
      <td>${(w*f.ts).toFixed(2)}</td>
      <td>${(w*f.pac).toFixed(2)}</td>
      <td>${(w*f.pod).toFixed(2)}</td>
      <td>${(w*f.fat).toFixed(2)}</td>
      <td>${(w*f.gluc).toFixed(2)}</td>
      <td>${(w*f.msnf).toFixed(2)}</td>
      <td>${(w*(f.pro||0)).toFixed(2)}</td>
      <td>${(w*(f.fib||0)).toFixed(2)}</td>
      <td>${(w*(f.lac||0)).toFixed(2)}</td>
      <td><input class="ci cost" type="number" value="${f.cost.toFixed(4)}" min="0" step="0.001"
        onchange="onCostChange('${item.name}',this.value)" onblur="snapshot()"></td>
      <td style="color:var(--green)">${(w*f.cost).toFixed(2)}</td>
      <td style="white-space:nowrap">
        <button class="edit-btn" onclick="openEditIngredient(${i})">✎</button>
        <button class="del-btn" onclick="delRow(${i})">✕</button>
      </td>`;
    tbody.appendChild(tr);
  });
  const t=calcTotals();
  document.getElementById('tW').textContent=t.W.toFixed(1);
  document.getElementById('tPct').textContent='100%';
  document.getElementById('tTS').textContent=t.TS.toFixed(2);
  document.getElementById('tPAC').textContent=t.PAC.toFixed(2);
  document.getElementById('tPOD').textContent=t.POD.toFixed(2);
  document.getElementById('tFat').textContent=t.Fat.toFixed(2);
  document.getElementById('tGluc').textContent=t.Gluc.toFixed(2);
  document.getElementById('tMSNF').textContent=t.MSNF.toFixed(2);

// ── PIE CHARTS ────────────────────────────────────────────────────────────────
function drawDonut(canvasId, legendId, segments){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,oR=Math.min(W,H)/2-3,iR=oR*.5,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  let angle=-Math.PI/2;
  const total=segments.reduce((s,x)=>s+x.val,0);
  if(!total)return;
  segments.forEach(s=>{
    const slice=(s.val/total)*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,oR,angle,angle+slice); ctx.closePath();
    ctx.fillStyle=s.color; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    angle+=slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,iR,0,2*Math.PI); ctx.fillStyle='#fff'; ctx.fill();
  ctx.fillStyle=segments[0]?.labelColor||'#1d1d1f'; ctx.font='bold 9px system-ui';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(segments[0]?.centerLabel||'',cx,cy);
  const leg=document.getElementById(legendId); if(!leg)return; leg.innerHTML='';
  segments.forEach(s=>{
    const li=document.createElement('div'); li.className='legend-item';
    li.innerHTML=`<div class="legend-dot" style="background:${s.color}"></div>
      <span class="legend-name" style="font-size:10px">${s.lbl}</span>
      <span class="legend-pct" style="font-size:10px">${(s.val/total*100).toFixed(1)}%</span>`;
    leg.appendChild(li);
  });
}
function renderPie(){
  const t=calcTotals();
  // TS vs FW donut
  drawDonut('pieTS','legendTS',[
    {lbl:'固形物',val:t.ts_pct,color:'#0071e3',centerLabel:`TS ${t.ts_pct.toFixed(0)}%`},
    {lbl:'水分',  val:t.fw_pct,color:'#34c759'},

// ── SAVE/LOAD ─────────────────────────────────────────────────────────────────
async function saveRecipe(){
  const name=document.getElementById('recipeName').value.trim();
  if(!name){showToast('請輸入配方名稱');return}
  const payload={
    formula:JSON.parse(JSON.stringify(formula)),
    basePcts:[...basePcts],
    target:getT(), baseTarget, recipeType,
    pkgItems:JSON.parse(JSON.stringify(pkgItems)),
    date:new Date().toLocaleDateString()
  };
  try{
    // 先查係咪已存在（用 name 作唯一識別）
    const existing = await sbFetch(`recipes?name=eq.${encodeURIComponent(name)}&select=id`);
    if(existing && existing.length>0){
      // UPDATE
      await sbFetch(`recipes?name=eq.${encodeURIComponent(name)}`,{
        method:'PATCH', prefer:'return=minimal',
        body: JSON.stringify({data: payload})
      });
    } else {
      // INSERT
      await sbFetch('recipes',{
        method:'POST', prefer:'return=minimal',
        body: JSON.stringify({name, data: payload})
      });
    }
    renderSaved(); showToast(`「${name}」已儲存 ✓`);
  } catch(err){ showToast('儲存失敗：'+err.message); }
}

async function loadRecipe(name){
  try{
    const rows = await sbFetch(`recipes?name=eq.${encodeURIComponent(name)}&select=data`);
    if(!rows||!rows.length){showToast('找不到配方');return;}
    snapshot();
    const r=rows[0].data;
    formula=r.formula;
    basePcts=r.basePcts||r.formula.map(f=>f.weight/Math.max(r.formula.reduce((a,x)=>a+x.weight,0),1));
    baseTarget=r.baseTarget||r.target||1000;
    pkgItems=r.pkgItems||pkgItems;
    document.getElementById('targetWeight').value=r.target;
    document.getElementById('recipeName').value=name;
    if(r.recipeType)_setType(r.recipeType);
    updateScaleRatio(); renderAll(); showToast(`已載入「${name}」`);
  } catch(err){ showToast('載入失敗：'+err.message); }
}

async function deleteRecipe(name,e){
  e.stopPropagation(); if(!confirm(`刪除「${name}」？`))return;
  try{
    await sbFetch(`recipes?name=eq.${encodeURIComponent(name)}`,{method:'DELETE'});
    renderSaved(); showToast('已刪除');
  } catch(err){ showToast('刪除失敗：'+err.message); }
}

async function renderSaved(){
  const wrap=document.getElementById('savedList');
  wrap.innerHTML='<div class="empty-state">載入中…</div>';
  try{
    const rows = await sbFetch('recipes?select=name,data&order=created_at.desc');
    wrap.innerHTML='';
    if(!rows||!rows.length){wrap.innerHTML='<div class="empty-state">暫無已儲存配方</div>';return}
    rows.forEach(row=>{
      const d=document.createElement('div'); d.className='saved-item';
      const name=row.name;
      const date=row.data&&row.data.date||'';
      d.innerHTML=`<span class="saved-nm" onclick="loadRecipe('${name.replace(/'/g,"\\'")}')">${name}</span>
        <span class="saved-dt">${date}</span>
        <button class="saved-del" onclick="deleteRecipe('${name.replace(/'/g,"\\'")}',event)">✕</button>`;
      wrap.appendChild(d);
    });
  } catch(err){ wrap.innerHTML=`<div class="empty-state" style="color:var(--red)">連線失敗，請檢查 Supabase 設定</div>`; }
}

function openDemoPanel(){
  const wrap=document.getElementById('demoPanelList'); wrap.innerHTML='';
  DEMOS.forEach(d=>{
    const card=document.createElement('div'); card.className='demo-card';
    card.innerHTML=`<div class="demo-title">${d.name}</div>
      <div class="demo-desc">${d.desc}</div>
      <div class="demo-tags">${d.formula.map(f=>`<span class="demo-tag">${f.name} ${f.weight}g</span>`).join('')}</div>`;
    card.onclick=()=>{ loadDemo(d); closeDemoPanel(); };
    wrap.appendChild(card);
  });
  document.getElementById('demoOverlay').classList.add('open');
}
function closeDemoPanel(){ document.getElementById('demoOverlay').classList.remove('open') }
document.getElementById('demoOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('demoOverlay'))closeDemoPanel();});
function loadDemo(d){
  snapshot();
  formula=JSON.parse(JSON.stringify(d.formula));
  const W=formula.reduce((s,f)=>s+f.weight,0);
  basePcts=formula.map(f=>f.weight/W);
  baseTarget=d.target;
  document.getElementById('targetWeight').value=d.target;
  _setType(d.type); updateScaleRatio(); renderAll();
  showToast(`已載入：${d.name}`);
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const W=totalW(),t=calcTotals();
  let csv='材料名稱,重量(g),佔比(%),TS,PAC貢獻,POD貢獻,脂肪,葡萄糖,MSNF,蛋白質,纖維,乳糖,成本/g,小計\n';
  formula.forEach(item=>{
    const f=getF(item.name),w=item.weight;
    csv+=`${item.name},${w},${W>0?(w/W*100).toFixed(1):0},${(w*f.ts).toFixed(2)},${(w*f.pac).toFixed(2)},${(w*f.pod).toFixed(2)},${(w*f.fat).toFixed(2)},${(w*f.gluc).toFixed(2)},${(w*f.msnf).toFixed(2)},${(w*(f.pro||0)).toFixed(2)},${(w*(f.fib||0)).toFixed(2)},${(w*(f.lac||0)).toFixed(2)},${f.cost},${(w*f.cost).toFixed(2)}\n`;
  });
  csv+=`\nPAC,${t.pac_abs.toFixed(1)}\n保存溫度,${t.storageTempC.toFixed(1)}°C\n總成本,${t.Cost.toFixed(2)}\n`;
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gelato.csv'; a.click();
  showToast('CSV 已匯出');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo()}
  if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo()}
});
document.getElementById('targetWeight').addEventListener('blur',()=>snapshot());

// ── TARGET ────────────────────────────────────────────────────────────────────
function updateScaleRatio(){ document.getElementById('scaleRatio').textContent=(getT()/baseTarget).toFixed(2)+'×' }
function onTargetInput(){
  updateScaleRatio();
  if(document.getElementById('autoScale').checked){
    const T=getT(); formula.forEach((item,i)=>{ item.weight=Math.round(T*(basePcts[i]||0)*10)/10; });
  }
  renderAll();
}
function resetToBase(){
  snapshot(); formula.forEach((item,i)=>{ item.weight=Math.round(baseTarget*(basePcts[i]||0)*10)/10; });
  document.getElementById('targetWeight').value=baseTarget; updateScaleRatio(); renderAll(); showToast('已還原基準配方');
}
function rebuildBase(){ baseTarget=getT(); basePcts=formula.map(f=>{const W=totalW();return W>0?f.weight/W:0;}); }

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){ renderTable(); renderDashboard(); renderKPI(); renderBars(); renderCost(); renderPackaging(); renderPie(); renderSugarPanel(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSaved(); renderAll(); snapshot();
</script>
